name: Release Formulae (Livecheck)

on:
  release:
    types: [ released ]

  workflow_dispatch:
    inputs:
      formula:
        description: 'Formula to release (leave empty to check all)'
        required: false
        default: ''
  schedule:
    - cron: '0 5 1 * *'

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  HOMEBREW_NO_REQUIRE_TAP_TRUST: 1

jobs:
  bump:
    name: Bump formulae
    runs-on: ubuntu-latest
    permissions:
      contents: write # to push commits
    steps:
      - name: Update formulae using Livecheck
        uses: dawidd6/action-homebrew-bump-formula@1446dca236b0440c6f02723a3f14f13be2c04ab0 # v7
        with:
          token: ${{ secrets.COMMITTER_TOKEN }}
          tap: fraluc06/homebrew-tap
          formula: ${{ inputs.formula }}
          livecheck: true
